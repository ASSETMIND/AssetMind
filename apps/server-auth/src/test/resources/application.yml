spring:
  # 테스트에서는 PostgreSQL 대신 H2(인메모리 DB)를 사용
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 생성, 끝나면 삭제
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Redis 설정 (테스트용)
  data:
    redis:
      host: localhost
      port: 6379

  # Mail 설정 (가짜 설정)
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      smtp:
        auth: false
        starttls:
          enable: false
          required: false

# 5. JWT 시크릿 키 (테스트용 고정값)
jwt:
  secret: "this-is-test-secret-key-for-assetmind-server-auth-1234"