spring:
  application:
    name: stock-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:assetmind}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

kis:
  token-expiration: 86400
  base-url: "https://openapivts.koreainvestment.com:29443"
  websocket-url: "ws://ops.koreainvestment.com:31000"
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET_KEY}