spring:
  application:
    name: stock-service

  sql:
    init:
      mode: always
      data-locations: classpath:stock-meta-data.sql

  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 10s

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:assetmind}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 1
      lettuce:
        shutdown-timeout: 100ms

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true


kis:
  token-expiration: 86400
  base-url: "https://openapivts.koreainvestment.com:29443"
  websocket-url: "ws://ops.koreainvestment.com:31000"
  accounts:
    - app-key: ${KIS_APP_KEY_1}
      app-secret: ${KIS_APP_SECRET_KEY_1}
    - app-key: ${KIS_APP_KEY_2}
      app-secret: ${KIS_APP_SECRET_KEY_2}