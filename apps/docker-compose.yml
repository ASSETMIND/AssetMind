# 통합 데이터베이스, server-auth와 server-stock이 같이 사용
version: '3.8'

services:
  # PostgreSQL 컨테이너
  postgres:
    image: postgres:16-alpine
    container_name: assetmind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis 컨테이너
  redis:
    image: redis:alpine
    container_name: assetmind-redis
    ports:
      - "6379:6379"
    restart: always

  # Prometheus 컨테이너 (모니터링 지표 수집기)
  prometheus:
    image: prom/prometheus:latest
    container_name: assetmind-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  # Grafana 컨테이너 (모니터링 대시보드)
  grafana:
    image: grafana/grafana:latest
    container_name: assetmind-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml # 자동 데이터소스 프로비저닝
      - ./grafana_data:/var/lib/grafana # 대시보드 데이터 영구 보존용 볼륨
    restart: unless-stopped