# ==============================================================================
# 데이터 수집 정책 설정 (Extraction Policy Configuration)
#
# 이 파일은 AppConfig를 통해 로드되며, KISExtractor는 이 설정을 참조하여
# 동적으로 API 요청을 생성합니다.
#
# 구조 (Structure):
#   [job_id]:                  # RequestDTO.job_id와 일치해야 하는 고유 키
#     description: str         # (선택) 작업 설명
#     path: str                # (필수) API Endpoint URL Path
#     tr_id: str               # (필수) 한국투자증권 Transaction ID
#     params:                  # (선택) 고정 파라미터 (Static Parameters)
#       key: value
#     extra_headers:           # (선택) 추가 헤더 (Extra Headers)
#       key: value
# ==============================================================================

policy:
  # ----------------------------------------------------------------------------
  # [Case 1] 국내 주식 기간별 시세 (일봉)
  # 가장 기본적인 데이터 수집 작업입니다.
  # ----------------------------------------------------------------------------
  kis_kospi_index_daily:
    description: "코스피 종합 지수 기간별 시세(일봉) 조회"
    path: "/uapi/domestic-stock/v1/quotations/inquire-daily-indexchartprice"
    tr_id: "FHKUP03500100"
    params:
      FID_COND_MRKT_DIV_CODE: "U" # 시장 분류 (U: 업종/지수)
      FID_PERIOD_DIV_CODE: "D" # 기간 분류 (D: 일봉, W: 주봉, M: 월봉)
      # FID_INPUT_ISCD: "0001" (코스피 종합)
      # FID_INPUT_DATE_1: "20240101" (시작일)
      # FID_INPUT_DATE_2: "20240131" (종료일)
