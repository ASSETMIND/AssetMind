# ==============================================================================
# 통합 데이터 수집 정책 (Unified Extraction Policy)
#
# 구조:
#   [job_id]:
#     provider: "KIS" | "FRED" | "ECOS"  <-- 핵심: 어떤 API를 쓸지 지정
#     description: ...
#     endpoint: ...
#     params: ...
# ==============================================================================

# ------------------------------------------------------------------------------
# [Templates] 공통 설정 선언부 (Python 파서에서는 무시되는 영역)
# ------------------------------------------------------------------------------
.templates:
  # 1. KIS 국내 지수 공통 템플릿
  kis_domestic_base: &kis_domestic_base
    provider: "KIS"
    domain: "domestic-stock"
    path: "/uapi/domestic-stock/v1/quotations/inquire-daily-indexchartprice"
    tr_id: "FHKUP03500100"
  kis_domestic_params: &kis_domestic_params
    FID_COND_MRKT_DIV_CODE: "U"
    FID_INPUT_DATE_1: "20240101"
    FID_INPUT_DATE_2: "20240131"
    FID_PERIOD_DIV_CODE: "D"

  # 2. KIS 해외 원자재 ETF 공통 템플릿
  kis_overseas_base: &kis_overseas_base
    provider: "KIS"
    domain: "overseas-price"
    path: "/uapi/overseas-price/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
  kis_overseas_params: &kis_overseas_params
    FID_COND_MRKT_DIV_CODE: "N"
    FID_INPUT_DATE_1: "20240101"
    FID_INPUT_DATE_2: "20240131"
    FID_PERIOD_DIV_CODE: "D"

