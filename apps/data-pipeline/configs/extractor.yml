# ==============================================================================
# 통합 데이터 수집 정책 (Unified Extraction Policy)
#
# 구조:
#   [job_id]:
#     provider: "KIS" | "FRED" | "ECOS"  <-- 핵심: 어떤 API를 쓸지 지정
#     description: ...
#     endpoint: ...
#     params: ...
# ==============================================================================

policy:
  # ----------------------------------------------------------------------------
  # [Group 1] 한국투자증권 (KIS) 관련 작업
  # ----------------------------------------------------------------------------
  # 1-1. 국내 주식 (일봉)
  kis_kospi_daily:
    provider: "KIS" # KISExtractor 사용
    domain: "domestic-stock" # KIS 내부에서의 구분 (국내)
    description: "코스피 지수 일봉"
    path: "/uapi/domestic-stock/v1/quotations/inquire-daily-indexchartprice"
    tr_id: "FHKUP03500100"
    params:
      FID_COND_MRKT_DIV_CODE: "U"
      FID_PERIOD_DIV_CODE: "D"

  # 1-2. 미국 주식 (일봉) - 같은 API지만 성격이 다름
  kis_nasdaq_daily:
    provider: "KIS"
    domain: "overseas-stock" # KIS 내부에서의 구분 (해외)
    description: "나스닥 지수 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N" # 나스닥

  # 1-3. 금 (Gold) - SPDR Gold Shares (GLD)
  kis_gold_etf_daily:
    provider: "KIS"
    domain: "overseas-stock" # 해외주식 도메인 사용
    description: "금(Gold) 가격 추종 ETF (GLD) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100" # 해외주식 기간별시세 (일/주/월/년)
    params:
      FID_COND_MRKT_DIV_CODE: "N" # 뉴욕증권거래소(NYSE)
      FID_INPUT_ISCD: "GLD" # 티커: GLD
      FID_PERIOD_DIV_CODE: "D" # 일봉

  # 1-4. 은 (Silver) - iShares Silver Trust (SLV)
  kis_silver_etf_daily:
    provider: "KIS"
    domain: "overseas-stock"
    description: "은(Silver) 가격 추종 ETF (SLV) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N"
      FID_INPUT_ISCD: "SLV"
      FID_PERIOD_DIV_CODE: "D"

  # 1-5. 원유 (Crude Oil) - United States Oil Fund (USO)
  kis_oil_etf_daily:
    provider: "KIS"
    domain: "overseas-stock"
    description: "WTI 원유 가격 추종 ETF (USO) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N"
      FID_INPUT_ISCD: "USO"
      FID_PERIOD_DIV_CODE: "D"

  # 1-6. 천연가스 (Natural Gas) - United States Natural Gas Fund (UNG)
  kis_gas_etf_daily:
    provider: "KIS"
    domain: "overseas-stock"
    description: "천연가스 선물 추종 ETF (UNG) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N"
      FID_INPUT_ISCD: "UNG"
      FID_PERIOD_DIV_CODE: "D"

  # 1-7. 구리 (Copper) - United States Copper Index Fund (CPER)
  kis_copper_etf_daily:
    provider: "KIS"
    domain: "overseas-stock"
    description: "구리 가격 추종 ETF (CPER) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N"
      FID_INPUT_ISCD: "CPER"
      FID_PERIOD_DIV_CODE: "D"

  # 1-8. 밀 (Wheat) - Teucrium Wheat Fund (WEAT)
  kis_wheat_etf_daily:
    provider: "KIS"
    domain: "overseas-stock"
    description: "밀 선물 가격 추종 ETF (WEAT) 일봉"
    path: "/uapi/overseas-stock/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    params:
      FID_COND_MRKT_DIV_CODE: "N"
      FID_INPUT_ISCD: "WEAT"
      FID_PERIOD_DIV_CODE: "D"

  # ----------------------------------------------------------------------------
  # [Group 2] FRED (Federal Reserve Economic Data) 관련 작업
  # ----------------------------------------------------------------------------
  # 2-1. 미국 국채 2년물
  fred_us_treasury_2y:
    provider: "FRED"
    description: "미국 국채 금리 2년물 (일별)"
    path: "/series/observations"
    params:
      series_id: "DGS2" # Market Yield on U.S. Treasury Securities at 2-Year Constant Maturity
      frequency: "d" # 일별 데이터 (Daily)

  # 2-2. 미국 국채 5년물
  fred_us_treasury_5y:
    provider: "FRED"
    description: "미국 국채 금리 5년물 (일별)"
    path: "/series/observations"
    params:
      series_id: "DGS5" # Market Yield on U.S. Treasury Securities at 5-Year Constant Maturity
      frequency: "d"

  # 2-3. 미국 국채 10년물 (시장 벤치마크)
  fred_us_treasury_10y:
    provider: "FRED"
    description: "미국 국채 금리 10년물 (일별)"
    path: "/series/observations"
    params:
      series_id: "DGS10" # Market Yield on U.S. Treasury Securities at 10-Year Constant Maturity
      frequency: "d"

  # 2-4. 미국 국채 30년물
  fred_us_treasury_30y:
    provider: "FRED"
    description: "미국 국채 금리 30년물 (일별)"
    path: "/series/observations"
    params:
      series_id: "DGS30" # Market Yield on U.S. Treasury Securities at 30-Year Constant Maturity
      frequency: "d"

  # ----------------------------------------------------------------------------
  # [Group 3 Extension] 한국 국채(KTB) 및 환율 데이터 (ECOS Source)
  # ----------------------------------------------------------------------------

  # 3-1. 한국 국채 3년물 (KTB 3Y)
  ecos_ktb_3y:
    provider: "ECOS"
    description: "국고채 3년 금리 (일별)"
    path: "/StatisticSearch"
    params:
      stat_code: "817Y002"
      item_code1: "010200000"
      cycle: "D"

  # 3-2. 한국 국채 5년물 (KTB 5Y)
  ecos_ktb_5y:
    provider: "ECOS"
    description: "국고채 5년 금리 (일별)"
    path: "/StatisticSearch"
    params:
      stat_code: "817Y002"
      item_code1: "010200001" # 국고채(5년)
      cycle: "D"

  # 3-3. 한국 국채 10년물 (KTB 10Y)
  ecos_ktb_10y:
    provider: "ECOS"
    description: "국고채 10년 금리 (일별)"
    path: "/StatisticSearch"
    params:
      stat_code: "817Y002"
      item_code1: "010210000"
      cycle: "D"

  # 3-4. 한국 국채 30년물 (KTB 30Y)
  ecos_ktb_30y:
    provider: "ECOS"
    description: "국고채 30년 금리 (일별)"
    path: "/StatisticSearch"
    params:
      stat_code: "817Y002"
      item_code1: "010230000"
      cycle: "D"

  # 3-5. 원/달러 환율 (KRW/USD)
  ecos_exchange_rate_usd:
    provider: "ECOS"
    description: "원/달러 환율 (종가, 일별)"
    path: "/StatisticSearch"
    params:
      stat_code: "731Y001"
      item_code1: "0000001"
      cycle: "D"

  # ----------------------------------------------------------------------------
  # [Group 4 Extension] 업비트 (Upbit) 암호화폐 데이터
  # ----------------------------------------------------------------------------
  # 4-1. 비트코인 (BTC) 일봉 - KRW 마켓
  upbit_btc_daily:
    provider: "UPBIT"
    description: "비트코인(BTC) 일봉 (KRW 마켓)"
    path: "/v1/candles/days"
    params:
      market: "KRW-BTC"
      count: 200 # 1회 요청 시 최대 반환 개수 (API 제한)

  # 4-2. 이더리움 (ETH) 일봉 - KRW 마켓
  upbit_eth_daily:
    provider: "UPBIT"
    description: "이더리움(ETH) 일봉 (KRW 마켓)"
    path: "/v1/candles/days"
    params:
      market: "KRW-ETH"
      count: 200
