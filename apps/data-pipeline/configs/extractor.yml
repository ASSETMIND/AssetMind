# ==============================================================================
# 통합 데이터 수집 정책 (Unified Extraction Policy)
#
# 구조:
#   [job_id]:
#     provider: "KIS" | "FRED" | "ECOS"  <-- 핵심: 어떤 API를 쓸지 지정
#     description: ...
#     endpoint: ...
#     params: ...
# ==============================================================================

# ------------------------------------------------------------------------------
# [Templates] 공통 설정 선언부
# ------------------------------------------------------------------------------
.templates:
  # 1. KIS 국내 지수 공통 템플릿
  kis_domestic_base: &kis_domestic_base
    provider: "KIS"
    domain: "domestic-stock"
    path: "/uapi/domestic-stock/v1/quotations/inquire-daily-indexchartprice"
    tr_id: "FHKUP03500100"
    chunk_size: 100
    base_date: "19900101"
  kis_domestic_params: &kis_domestic_params
    FID_COND_MRKT_DIV_CODE: "U"
    FID_INPUT_DATE_1: "$START_DATE"
    FID_INPUT_DATE_2: "$END_DATE"
    FID_PERIOD_DIV_CODE: "D"

  # 2. KIS 해외 원자재 ETF 공통 템플릿
  kis_overseas_base: &kis_overseas_base
    provider: "KIS"
    domain: "overseas-price"
    path: "/uapi/overseas-price/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    chunk_size: 100
    base_date: "20000101"
  kis_overseas_params: &kis_overseas_params
    FID_COND_MRKT_DIV_CODE: "N"
    FID_INPUT_DATE_1: "$START_DATE"
    FID_INPUT_DATE_2: "$END_DATE"
    FID_PERIOD_DIV_CODE: "D"

  # 3. KIS 해외 환율 공통 템플릿
  kis_fx_base: &kis_fx_base
    provider: "KIS"
    domain: "overseas-price"
    path: "/uapi/overseas-price/v1/quotations/inquire-daily-chartprice"
    tr_id: "FHKST03030100"
    chunk_size: 100
    base_date: "20030101"
  kis_fx_params: &kis_fx_params
    FID_COND_MRKT_DIV_CODE: "X"
    FID_INPUT_DATE_1: "$START_DATE"
    FID_INPUT_DATE_2: "$END_DATE"
    FID_PERIOD_DIV_CODE: "D"

  # 4. FRED 공통 베이스 템플릿
  fred_base: &fred_base
    provider: "FRED"
    path: "/series/observations"
    chunk_size: 3650
    base_date: "19600101"
  fred_params: &fred_params
    frequency: "d"
    observation_start: "$START_DATE_DASH"
    observation_end: "$END_DATE_DASH"

  # 5. ECOS 공통 베이스 템플릿
  ecos_base: &ecos_base
    provider: "ECOS"
    path: "/StatisticSearch"
    chunk_size: 10000
    base_date: "19990101"

  # 6. ECOS 일별(D) 파라미터 공통 템플릿
  ecos_daily_params: &ecos_daily_params
    cycle: "D"
    start_date: "$START_DATE"
    end_date: "$END_DATE"

  # 7. ECOS 월별(M) 파라미터 공통 템플릿
  ecos_monthly_params: &ecos_monthly_params
    cycle: "M"
    start_date: "$START_DATE"
    end_date: "$END_DATE"

  # 8. ECOS 분기별(Q) 파라미터 공통 템플릿
  ecos_quarterly_params: &ecos_quarterly_params
    cycle: "Q"
    start_date: "$START_DATE"
    end_date: "$END_DATE"

  # 9. UPBIT 일별 캔들 공통 템플릿
  upbit_daily_base: &upbit_daily_base
    provider: "UPBIT"
    path: "/v1/candles/days"
    chunk_size: 200
    base_date: "20170901"
  upbit_daily_params: &upbit_daily_params
    start_date: "$START_DATE"
    end_date: "$END_DATE"

