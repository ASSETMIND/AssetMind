# ==============================================================================
# 파이프라인 오케스트레이션 정책 (Pipeline Orchestration Policy)
#
# 목적: pipeline_service.py에서 실행할 단위 작업(Task)을 정의합니다.
# 역할: extractor.yml의 수집 대상(Job)과 loader.yml의 적재 방식을 조립(Mapping)합니다.
# 사용법: PipelineService("bronze_daily_batch") 와 같이 Task Key를 주입하여 실행합니다.
# ==============================================================================

tasks:
